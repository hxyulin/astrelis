[workspace]
resolver = "3"
members = ["crates/astrelis-core", "crates/astrelis-profiling"]

[workspace.package]
version = "0.3.0"
authors = ["hxyulin <hxyulin@proton.me>"]
edition = "2024"
license = "MIT"
repository = "https://github.com/hxyulin/astrelis"

[workspace.dependencies]
# Internal crates
astrelis-core = { path = "crates/astrelis-core", version = "0.3.0" }
astrelis-profiling = { path = "crates/astrelis-profiling", version = "0.3.0" }

# Math
glam = { version = "0.32", features = ["mint", "bytemuck"] }
bytemuck = { version = "1", features = ["derive"] }
mint = "0.5"

# Profiling
puffin = "0.20"
puffin_http = "0.17"

[workspace.lints.rust]
missing_docs = "warn"

[workspace.lints.clippy]
all = "warn"
