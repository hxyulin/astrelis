[workspace]
resolver = "3"
members = [
    "crates/astrelis-core",
    "crates/astrelis-profiling",
    "crates/astrelis-window",
    "crates/astrelis-window-winit",
    "crates/astrelis-window-test",
    "crates/astrelis-gpu",
    "crates/astrelis-gpu-wgpu",
    "crates/astrelis-gpu-wgpu-egui",
    "crates/astrelis-input",
    "crates/astrelis-assets",
    "crates/astrelis-text",
    "crates/astrelis-text-wgpu",
]

[workspace.package]
version = "0.3.0"
authors = ["hxyulin <hxyulin@proton.me>"]
edition = "2024"
license = "MIT"
repository = "https://github.com/hxyulin/astrelis"

[workspace.dependencies]
# Internal crates
astrelis-core = { path = "crates/astrelis-core", version = "0.3.0" }
astrelis-profiling = { path = "crates/astrelis-profiling", version = "0.3.0" }
astrelis-window = { path = "crates/astrelis-window", version = "0.3.0" }
astrelis-window-winit = { path = "crates/astrelis-window-winit", version = "0.3.0" }
astrelis-window-test = { path = "crates/astrelis-window-test", version = "0.3.0" }
astrelis-gpu = { path = "crates/astrelis-gpu", version = "0.3.0" }
astrelis-gpu-wgpu = { path = "crates/astrelis-gpu-wgpu", version = "0.3.0" }
astrelis-gpu-wgpu-egui = { path = "crates/astrelis-gpu-wgpu-egui", version = "0.3.0" }
astrelis-input = { path = "crates/astrelis-input", version = "0.3.0" }
astrelis-assets = { path = "crates/astrelis-assets", version = "0.3.0" }
astrelis-text = { path = "crates/astrelis-text", version = "0.3.0" }
astrelis-text-wgpu = { path = "crates/astrelis-text-wgpu", version = "0.3.0" }

# Math
glam = { version = "0.32", features = ["mint", "bytemuck"] }
bytemuck = { version = "1", features = ["derive"] }
mint = "0.5"

# Windowing
winit = "0.30"
raw-window-handle = "0.6"

# GPU
wgpu = "29"
pollster = "0.4"

# egui
egui = "0.34"
egui-wgpu = "0.34"

# Profiling
puffin = "0.19"
puffin_http = "0.16"
profiling = { version = "1.0", default-features = false }


# Assets
notify = "8"

# Text
cosmic-text = "0.18"
sys-locale = "0.3"
tracing = "0.1"
fxhash = "0.2"

[workspace.lints.rust]
missing_docs = "warn"

[workspace.lints.clippy]
all = "warn"
