[workspace]
resolver = "3"
members = [
    "crates/astrelis-core",
    "crates/astrelis-profiling",
    "crates/astrelis-profiling-egui",
    "crates/astrelis-window",
    "crates/astrelis-window-test",
    "crates/astrelis-gpu",
    "crates/astrelis-gpu-egui",
    "crates/astrelis-input",
    "crates/astrelis-assets",
    "crates/astrelis-text",
    "crates/astrelis-text-wgpu",
    "crates/astrelis-app",
    "crates/astrelis-scene",
    "crates/astrelis-render-2d",
    "crates/astrelis-render-3d",
    "crates/astrelis",
]

[workspace.package]
version = "0.3.0"
authors = ["hxyulin <hxyulin@proton.me>"]
edition = "2024"
license = "MIT"
repository = "https://github.com/hxyulin/astrelis"

[workspace.dependencies]
# Internal crates
astrelis-core = { path = "crates/astrelis-core", version = "0.3.0" }
astrelis-profiling = { path = "crates/astrelis-profiling", version = "0.3.0" }
astrelis-profiling-egui = { path = "crates/astrelis-profiling-egui", version = "0.3.0" }
astrelis-window = { path = "crates/astrelis-window", version = "0.3.0" }
astrelis-window-test = { path = "crates/astrelis-window-test", version = "0.3.0" }
astrelis-gpu = { path = "crates/astrelis-gpu", version = "0.3.0", features = ["molten-vk"] }
astrelis-gpu-egui = { path = "crates/astrelis-gpu-egui", version = "0.3.0" }
astrelis-input = { path = "crates/astrelis-input", version = "0.3.0" }
astrelis-assets = { path = "crates/astrelis-assets", version = "0.3.0" }
astrelis-text = { path = "crates/astrelis-text", version = "0.3.0" }
astrelis-text-wgpu = { path = "crates/astrelis-text-wgpu", version = "0.3.0" }
astrelis-app = { path = "crates/astrelis-app", version = "0.3.0" }
astrelis-scene = { path = "crates/astrelis-scene", version = "0.3.0" }
astrelis-render-2d = { path = "crates/astrelis-render-2d", version = "0.3.0" }
astrelis-render-3d = { path = "crates/astrelis-render-3d", version = "0.3.0" }

# Math
glam = { version = "0.32", features = ["mint", "bytemuck"] }
bytemuck = { version = "1", features = ["derive"] }
mint = "0.5"

# Scene
slotmap = "1"

# Windowing
winit = "0.30"
raw-window-handle = "0.6"

# GPU
wgpu = "29"
pollster = "0.4"

# egui
egui = "0.34"
egui-wgpu = "0.34"

# Profiling
wgpu-profiler = { version = "0.27", default-features = false }
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }


# Assets
notify = "8"

# Text
cosmic-text = "0.18"
sys-locale = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
fxhash = "0.2"

[workspace.lints.rust]
missing_docs = "warn"

[workspace.lints.clippy]
all = "warn"
