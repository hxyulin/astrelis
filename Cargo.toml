[workspace]
resolver = "3"
members = [
    "crates/astrelis-core",
    "crates/astrelis-profiling",
    "crates/astrelis-window",
    "crates/astrelis-window-winit",
    "crates/astrelis-window-test",
    "crates/astrelis-gpu",
    "crates/astrelis-gpu-wgpu",
]

[workspace.package]
version = "0.3.0"
authors = ["hxyulin <hxyulin@proton.me>"]
edition = "2024"
license = "MIT"
repository = "https://github.com/hxyulin/astrelis"

[workspace.dependencies]
# Internal crates
astrelis-core = { path = "crates/astrelis-core", version = "0.3.0" }
astrelis-profiling = { path = "crates/astrelis-profiling", version = "0.3.0" }
astrelis-window = { path = "crates/astrelis-window", version = "0.3.0" }
astrelis-window-winit = { path = "crates/astrelis-window-winit", version = "0.3.0" }
astrelis-window-test = { path = "crates/astrelis-window-test", version = "0.3.0" }
astrelis-gpu = { path = "crates/astrelis-gpu", version = "0.3.0" }
astrelis-gpu-wgpu = { path = "crates/astrelis-gpu-wgpu", version = "0.3.0" }

# Math
glam = { version = "0.32", features = ["mint", "bytemuck"] }
bytemuck = { version = "1", features = ["derive"] }
mint = "0.5"

# Windowing
winit = "0.30"
raw-window-handle = "0.6"

# GPU
wgpu = "29"
pollster = "0.4"

# Profiling
puffin = "0.20"
puffin_http = "0.17"

[workspace.lints.rust]
missing_docs = "warn"

[workspace.lints.clippy]
all = "warn"
