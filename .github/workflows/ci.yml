name: CI

on:
  push:
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  release-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Check declared MSRV
        run: cargo check --workspace --all-features
      - name: Check WebAssembly
        run: cargo check --workspace --all-features --target wasm32-unknown-unknown
      - name: Check documentation
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Build publishable archives
        run: cargo package --workspace --no-verify

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev \
            libxrandr-dev libxi-dev libxcursor-dev libvulkan-dev
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev \
            libxrandr-dev libxi-dev libxcursor-dev libvulkan-dev \
            mesa-vulkan-drivers
      # GPU-backed tests skip themselves when no adapter is available, so this
      # job passes without a GPU. mesa-vulkan-drivers gives the runner a
      # software adapter so the offscreen tests actually execute rather than
      # silently skipping.
      - name: Test
        run: cargo test --workspace
