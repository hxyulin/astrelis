[package]
name = "astrelis-ui-widgets"
description = "Reusable retained widget compositions for Astrelis"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
astrelis-core = { workspace = true }
astrelis-paint = { workspace = true }
astrelis-platform = { workspace = true }
astrelis-ui-core = { workspace = true }

[dev-dependencies]
astrelis-app = { workspace = true }
astrelis-gpu = { workspace = true }
astrelis-gpu-wgpu = { path = "../astrelis-gpu-wgpu" }
astrelis-paint-gpu = { path = "../astrelis-paint-gpu" }
astrelis-platform-test = { path = "../astrelis-platform-test" }
astrelis-platform-winit = { path = "../astrelis-platform-winit" }
astrelis-render = { workspace = true }
astrelis-render-2d = { workspace = true }
astrelis-render-3d = { workspace = true }
astrelis-text = { workspace = true }
pollster = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
web-sys = { workspace = true, features = ["Document", "Element", "HtmlCanvasElement", "Window"] }

[lints]
workspace = true
