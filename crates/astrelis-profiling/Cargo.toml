[package]
name = "astrelis-profiling"
description = "Backend-agnostic profiling macros for the Astrelis engine"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[features]
puffin = ["dep:puffin", "dep:puffin_http", "dep:profiling"]

[dependencies]
puffin = { workspace = true, optional = true }
puffin_http = { workspace = true, optional = true }
profiling = { workspace = true, optional = true, features = ["profile-with-puffin"] }

[lints]
workspace = true
