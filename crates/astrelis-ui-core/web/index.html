<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Astrelis settings</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #090c14;
      }

      #astrelis-canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }

      #astrelis-status {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
        color: #e9efff;
        font: 16px/1.5 system-ui, sans-serif;
        text-align: center;
        pointer-events: none;
      }

      #astrelis-status[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <canvas id="astrelis-canvas"></canvas>
    <div id="astrelis-status" role="status">Starting Astrelis…</div>
    <script type="module">
      import init from "./pkg/astrelis_settings.js";

      init().catch((error) => {
        const status = document.querySelector("#astrelis-status");
        status.hidden = false;
        status.textContent = `Unable to start Astrelis: ${error}`;
        console.error(error);
      });
    </script>
  </body>
</html>
